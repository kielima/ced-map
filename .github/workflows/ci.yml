name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Validate JSON files and banco schema
        run: python build/validate_data.py

      - name: Run pytest
        run: python -m pytest build/tests/ -v

      - name: Validate JS syntax
        run: node --check js/app.js

      - name: Build pipeline smoke test
        run: |
          python build/build_banco_unificado.py
          test -f build/BANCO_UNIFICADO_CED.csv

      - name: Verify referenced files exist
        run: |
          test -f js/app.js
          test -f style.css
          test -f sw.js
          test -f manifest.json
          test -f index.html
